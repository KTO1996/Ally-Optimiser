name: Build Windows exe

# Build AllyOptimizer.exe on a Windows runner. Runs on every push to main and
# on tags like v1.0.0. Tagged builds also publish a GitHub Release with the exe
# zip attached, so you can download a ready-to-run app without installing Python.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to create and release (e.g. v1.0.0). Leave blank for an artifact-only build.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Run tests (real Windows)
        run: python tests/test_logic.py

      - name: Smoke test — launch app + build every page (real Windows)
        # Exercises the read-only Windows paths (model detection, powercfg /a,
        # registry reads, app detection) by actually constructing the UI. No
        # hardware writes. Fails the build if the app can't launch on Windows.
        run: python main.py --smoke

      - name: Build exe
        run: pyinstaller --noconfirm AllyOptimizer.spec

      - name: Zip the build
        run: Compress-Archive -Path dist/AllyOptimizer/* -DestinationPath AllyOptimizer-windows.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AllyOptimizer-windows
          path: AllyOptimizer-windows.zip

      - name: Publish release
        # Runs on a v* tag push, or a manual run where a version was supplied.
        # softprops/action-gh-release creates the tag at this commit if needed.
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: AllyOptimizer-windows.zip
