name: Build Windows exe

# Build AllyOptimizer.exe on a Windows runner. Runs on every push to main and
# on tags like v1.0.0. Tagged builds also publish a GitHub Release with the exe
# zip attached, so you can download a ready-to-run app without installing Python.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to create and release (e.g. v1.0.0). Leave blank for an artifact-only build.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Run tests (real Windows)
        run: python tests/test_logic.py

      - name: Smoke test — launch app + build every page (real Windows)
        # Exercises the read-only Windows paths (model detection, powercfg /a,
        # registry reads, app detection) by actually constructing the UI. No
        # hardware writes. Fails the build if the app can't launch on Windows.
        run: python main.py --smoke

      - name: Build exe
        run: pyinstaller --noconfirm AllyOptimizer.spec

      - name: Zip the build
        run: Compress-Archive -Path dist/AllyOptimizer/* -DestinationPath AllyOptimizer-windows.zip
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AllyOptimizer-windows
          path: AllyOptimizer-windows.zip

      - name: Publish release
        # Runs on a v* tag push, or a manual run where a version was supplied.
        # softprops/action-gh-release creates the tag at this commit if needed.
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: AllyOptimizer-windows.zip
          body: |
            ## Ally Optimizer — ROG Xbox Ally / Ally X optimiser

            One app for tuning your Ally: per-game TDP profiles (RyzenAdj),
            reversible Windows tweaks, FPS boosters (AFMF/RSR/FSR + Fullscreen
            Exclusive), and hibernation fixes for the overnight battery drain.
            Dark/light themed UI. Auto-detects Ally vs Ally X.

            ### Install
            1. Download **AllyOptimizer-windows.zip** below and unzip it.
            2. Drop `ryzenadj.exe` into the folder (or point the app at it). See
               the [RyzenAdj setup](https://github.com/KTO1996/Ally-Optimiser#ryzenadj-setup-required-not-bundled).
            3. Double-click **AllyOptimizer.exe** and accept the admin prompt.

            ### Before you start
            - **SmartScreen will warn** — the exe is unsigned, so Windows shows an
              "unrecognised publisher" prompt. Choose *More info → Run anyway* if
              you trust it. The app does not try to suppress that warning.
            - **Run the on-device sanity check** the first time:
              [First run on the Ally](https://github.com/KTO1996/Ally-Optimiser#first-run-on-the-ally--sanity-check).
              Everything is reversible and the app can make a System Restore point
              before any tweak.

            > The UI + read-only logic are tested on a Windows CI runner; the
            > hardware-touching actions (TDP, powercfg, FSE) are best confirmed on
            > the device via the checklist above.
